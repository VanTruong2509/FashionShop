<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liên Hệ - FASHIONSTORE</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* --- CSS Phong Cách Đã Được Cập Nhật --- */
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }

        body {
            background: #EBFBFF; /* Màu nền xanh pastel nhẹ */
            padding: 20px;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            background: #5F8FAF; /* Màu nền header xanh biển */
            color: white;
            padding: 15px;
            text-align: center;
            border-radius: 10px;
            margin-bottom: 20px;
            width: 100%;
            max-width: 1100px;
        }

        h1 {
            text-align: center;
            color: #001657; /* Màu chữ tiêu đề xanh đậm */
            margin-bottom: 30px;
        }

        /* Thêm biểu tượng hòm thư trước tiêu đề */
        h1::before {
            content: "\f0e0"; /* Mã unicode cho biểu tượng hòm thư trong FontAwesome */
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
            margin-right: 10px;
            color: #001657;
        }

        /* Container chính cho bố cục 2 cột */
        .contact-container {
            max-width: 1100px;
            margin: 0 auto;
            width: 100%;
        }

        /* Bố cục Grid 2 cột cho Form và Thông tin */
        .contact-grid {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 25px;
        }

        /* Phong cách cho các khung (card) */
        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 5px 10px rgba(0,0,0,0.1);
            transition: 0.3s;
        }

        .card:hover {
            transform: scale(1.01); /* Hiệu ứng phóng nhẹ khi di chuột */
        }

        .card h3 {
            color: #001657;
            margin-bottom: 20px;
            font-size: 20px;
        }

        /* Phong cách cho Form nhập liệu */
        .form-group { margin-bottom: 15px; }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #001657;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            border: 1px solid #5F8FAF;
            border-radius: 10px;
            outline: none;
            transition: 0.3s;
        }

        .form-control:focus {
            border-color: #001657;
            box-shadow: 0 0 5px rgba(95, 143, 175, 0.3);
        }

        /* Phong cách cho nút gửi */
        .btn-submit {
            background: #d8eb07; /* Màu nền nút vàng chanh */
            color: #001657;
            border: none;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            width: 100%;
            font-size: 16px;
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-submit:hover {
            transform: scale(1.05);
            background: #c5d800;
        }

        /* Thêm biểu tượng máy bay giấy sau chữ trên nút */
        .btn-submit::after {
            content: "\f1d8"; /* Mã unicode cho biểu tượng máy bay giấy */
            font-family: "Font Awesome 6 Free";
            font-weight: 900;
        }

        /* Phong cách cho các mục thông tin */
        .info-item {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .info-item i {
            background: #5F8FAF; /* Màu nền icon xanh biển */
            color: white;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
            font-size: 18px;
        }

        .info-text p {
            font-weight: bold;
            color: #333;
        }

        /* Phong cách cho khung chứa bản đồ */
        .map-box {
            margin-top: 20px;
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid #5F8FAF;
            height: 300px; /* Tăng chiều cao để bản đồ hiển thị tốt hơn */
            position: relative;
        }

        /* Đảm bảo iframe bản đồ chiếm hết khung chứa */
        .map-box iframe {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 0;
            left: 0;
        }

        /* Phản hồi trên thiết bị di động */
        @media (max-width: 850px) {
            .contact-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<header>
    <h2>FASHIONSTORE - Liên Hệ</h2>
</header>

<h1>Gửi Phản Hồi Cho Chúng Tôi</h1>

<div class="contact-container">
    <div class="contact-grid">
        <div class="card">
            <h3>Để lại lời nhắn</h3>
            <form id="contactForm">
                <div class="form-group">
                    <label>Họ và tên</label>
                    <input type="text" class="form-control" placeholder="Nhập tên của bạn..." required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" class="form-control" placeholder="example@gmail.com" required>
                </div>
                <div class="form-group">
                    <label>Nội dung</label>
                    <textarea class="form-control" rows="5" placeholder="Bạn cần hỗ trợ điều gì?" required></textarea>
                </div>
                <button type="submit" class="btn-submit">Gửi Tin Nhắn</button>
            </form>
        </div>

        <div class="card">
            <h3>Thông tin liên lạc</h3>

            <div class="info-item">
                <i class="fa-solid fa-phone"></i>
                <div class="info-text">
                    <p>028 7108 5555</p>
                </div>
            </div>

            <div class="info-item">
                <i class="fa-solid fa-envelope"></i>
                <div class="info-text">
                    <p>support@fashionstore.com</p>
                </div>
            </div>

            <div class="info-item">
                <i class="fa-solid fa-location-dot"></i>
                <div class="info-text">
                    <p>141 Phan Xích Long, P.2, Q.Phú Nhuận</p>
                </div>
            </div>

            <div class="map-box">
                <iframe
                    src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3919.42168341655!2d106.68536831474889!3d10.793616692310188!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x317528cb6a745555%3A0x86177e6840748b6!2zMTQxIFBoYW4gWMOtY2ggTG9uZywgUGjGsOG7nW5nIDIsIFBow7ogTmh14bqtbiwgVGjDoG5oIHBo4buRIEjhu5MgQ2jDrSBNYW5oLCBWaeG7h3QgTmFt!5e0!3m2!1svi!2s!4v1680164808316!5m2!1svi!2s"
                    style="border:0;"
                    allowfullscreen=""
                    loading="lazy"
                    referrerpolicy="no-referrer-when-downgrade">
                </iframe>
            </div>
        </div>
    </div>
</div>

<script>
    // Xử lý sự kiện khi gửi form để hiển thị thông báo và xóa dữ liệu form
    document.getElementById('contactForm').onsubmit = function(e) {
        e.preventDefault();
        alert('Cảm ơn bạn! FashionStore đã nhận được tin nhắn của bạn.');
        this.reset();
    };
</script>

</body>
</html>
