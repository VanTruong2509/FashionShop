<!DOCTYPE html>
<html lang="vi">
    <head>
        <meta charset="UTF-8">
        <title>Admin Panel - Fashion Shop</title>
        <link rel="stylesheet"href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>

		*{
		margin:0;
		padding:0;
		box-sizing:border-box;
		font-family:Arial;
		}

		body{
		background:#f4f6f9;
		}

		/* Layout */

		.container{
		display:flex;
		min-height:100vh;
		}

		/* Sidebar */

		.sidebar{
		width:240px;
		background:#1e1e2f;
		color:white;
		padding:20px;
		display:flex;
		flex-direction:column;
		justify-content:space-between;
		}

		.sidebar h2{
		text-align:center;
		margin-bottom:30px;
		}

		.sidebar ul{
		list-style:none;
		}

		.sidebar li{
		margin:18px 0;
		}

		.sidebar a{
		color:white;
		text-decoration:none;
		font-size:16px;
		display:flex;
		align-items:center;
		gap:10px;
		padding:8px;
		border-radius:6px;
		transition:0.3s;
		}

		.sidebar a:hover{
		background:#2c3e50;
		color:#ff9800;
		}

		/* Logout */

		.logout{
		padding-top:20px;
		border-top:1px solid rgba(255,255,255,0.2);
		}

		.logout button{
		width:100%;
		padding:12px;
		background:linear-gradient(135deg,#ff4b2b,#ff416c);
		color:white;
		border:none;
		border-radius:8px;
		font-size:15px;
		font-weight:bold;
		cursor:pointer;
		display:flex;
		align-items:center;
		justify-content:center;
		gap:8px;
		transition:0.3s;
		}

		.logout button:hover{
		transform:translateY(-2px);
		box-shadow:0 6px 12px rgba(0,0,0,0.2);
		}

		/* Main */

		.main{
		flex:1;
		padding:30px;
		}

		.main h1{
		margin-bottom:25px;
		}

		/* Dashboard cards */

		.cards{
		display:grid;
		grid-template-columns:repeat(4,1fr);
		gap:20px;
		margin-bottom:30px;
		}

		.card{
		background:white;
		padding:20px;
		border-radius:10px;
		box-shadow:0 3px 8px rgba(0,0,0,0.1);
		text-align:center;
		transition:0.3s;
		}

		.card:hover{
		transform:translateY(-3px);
		}

		.card i{
		font-size:28px;
		color:#ff9800;
		margin-bottom:10px;
		}

		/* Product table */

		.table-container{
		background:white;
		padding:20px;
		border-radius:10px;
		box-shadow:0 3px 8px rgba(0,0,0,0.1);
		}

		.add{
		background:#27ae60;
		color:white;
		border:none;
		padding:10px 14px;
		border-radius:6px;
		cursor:pointer;
		margin-bottom:15px;
		}

		.add:hover{
		background:#1e8449;
		}

		table{
		width:100%;
		border-collapse:collapse;
		}

		th,td{
		padding:12px;
		text-align:center;
		border-bottom:1px solid #ddd;
		}

		th{
		background:#2c3e50;
		color:white;
		}

		img{
		width:60px;
		border-radius:5px;
		}

		.edit{
		background:#2196f3;
		color:white;
		border:none;
		padding:6px 10px;
		border-radius:4px;
		cursor:pointer;
		}

		.delete{
		background:#e74c3c;
		color:white;
		border:none;
		padding:6px 10px;
		border-radius:4px;
		cursor:pointer;
		}

		.edit:hover{
		background:#1976d2;
		}

		.delete:hover{
		background:#c0392b;
		}

		/* Responsive */

		@media(max-width:900px){

		.cards{
		grid-template-columns:repeat(2,1fr);
		}

		.sidebar{
		width:200px;
		}

		}

		</style>
</head>
<body>
<div class="container">
<!-- Sidebar -->

<div class="sidebar">
<div>
<h2>Fashion Admin</h2>
<ul>
    <li><a href="dashboard.html"><i class="fa fa-chart-line"></i> Dashboard </a> </li> 
    <li><a href="admin.html"><i class="fa fa-shirt"></i> Products </a></li> <li><a href="orders.html"><i class="fa fa-cart-shopping"></i> Orders </a></li>
    <li><a href="reviews.html"><i class="fa fa-star"></i> Reviews </a></li>
    <li><a href="#"><i class="fa fa-envelope"></i> Feedback </a> </li>
</ul>

</div>

<div class="logout">
    <button onclick="logout()"> <i class="fa fa-right-from-bracket"></i>
        Đăng xuất
    </button>
</div>

</div>

<!-- Main content -->

<div class="main">
    <h1>Dashboard</h1>
<div class="cards">
<div class="card"><i class="fa fa-shirt"></i>
    <h3>Products</h3>
    <p>120</p>
</div>

<div class="card">
    <i class="fa fa-cart-shopping"></i>
    <h3>Orders</h3> 
    <p>80</p>
</div>

<div class="card">
    <i class="fa fa-star"></i>
    <h3>Reviews</h3>
    <p>34</p>
</div>

<div class="card">
    <i class="fa fa-envelope"></i>
    <h3>Feedback</h3>
    <p>12</p>
</div>
</div>

<div class="table-container">

<h2>Product Management</h2>

<button class="add" onclick="openModal()"> <i class="fa fa-plus"></i> Add Product </button>

<table>
<thead>
<tr>
<th>ID</th>
<th>Image</th>
<th>Name</th>
<th>Price</th>
<th>Old Price</th>
<th>Action</th>
</tr>
</thead>

<tbody id="productList"></tbody>
</table>
</div>
</div>
</div>

<script>
let products = JSON.parse(localStorage.getItem("products")) || [];

function openModal(){
    document.getElementById("productModal").style.display = "flex";
}

function closeModal(){
    document.getElementById("productModal").style.display = "none";
    document.getElementById("productId").value = "";
}

// HIỂN THỊ
function renderProducts(){
    const list = document.getElementById("productList");
    list.innerHTML = "";

    products.forEach((p, index) => {
        list.innerHTML += `
        <tr>
            <td>${index+1}</td>
            <td><img src="${p.image || ''}"></td>
            <td>${p.name}</td>
            <td style="color:red">${p.price}đ</td>
            <td><del>${p.oldPrice}đ</del></td>
            <td>
                <button class="edit" onclick="editProduct(${index})">Edit</button>
                <button class="delete" onclick="deleteProduct(${index})">Delete</button>
            </td>
        </tr>
        `;
    });

    localStorage.setItem("products", JSON.stringify(products));
}

// SAVE
function saveProduct(){
    const id = document.getElementById("productId").value;
    const name = document.getElementById("name").value;
    const price = document.getElementById("price").value;
    const oldPrice = document.getElementById("oldPrice").value;
    const image = document.getElementById("image").value;

    saveData(id, name, price, oldPrice, image);
}

function saveData(id, name, price, oldPrice, image){
    if(id === ""){
        products.push({name, price, oldPrice, image});
    }else{
        products[id].name = name;
        products[id].price = price;
        products[id].oldPrice = oldPrice;
        if(image) products[id].image = image;
    }

    closeModal();
    renderProducts();
}

// EDIT
function editProduct(index){
    const p = products[index];

    document.getElementById("productId").value = index;
    document.getElementById("name").value = p.name;
    document.getElementById("price").value = p.price;
    document.getElementById("oldPrice").value = p.oldPrice;

    openModal();
}

// DELETE
function deleteProduct(index){
    if(confirm("Xóa sản phẩm?")){
        products.splice(index,1);
        renderProducts();
    }
}

// LOGOUT
function logout(){
    if(confirm("Bạn có chắc muốn đăng xuất không?")){
        window.location.href="login.html";
    }
}

// LOAD
renderProducts();
</script>
<div id="productModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); justify-content:center; align-items:center;">
    <div style="background:white; padding:20px; border-radius:10px; width:400px;">
        <h3>Thêm sản phẩm</h3>

        <input type="hidden" id="productId">

        <input type="text" id="name" placeholder="Tên sản phẩm"><br><br>
        <input type="number" id="price" placeholder="Giá mới"><br><br>
        <input type="number" id="oldPrice" placeholder="Giá cũ"><br><br>
        <select id="image" style="width:100%; padding:8px;">
    <option value="images/aokhoacbombernam.png">Áo khoác bomber nam</option>
    <option value="images/aokhoaccardigan.png">Áo khoác cardigan</option>
    <option value="images/aolonamslimfit.png">Áo nam slimfit</option>
    <option value="images/aopolocoV.png">Áo polo cổ V</option>
    <option value="images/aopolonamthun.png">Áo polo nam thun</option>
    <option value="images/aosomidenimnu.png">Áo sơ mi denim nữ</option>
    <option value="images/aosominamregularfit.png">Áo sơ mi nam regular</option>
    <option value="images/aosominamslimfit.png">Áo sơ mi nam slimfit</option>
    <option value="images/aosominucov.png">Áo sơ mi nữ cổ V</option>
    <option value="images/aosominucroptop.png">Áo sơ mi nữ croptop</option>
    <option value="images/quanjeannamslimfit.png">Quần jean nam</option>
    <option value="images/quanjeannuongrong.png">Quần jean nữ rộng</option>
    <option value="images/quankakinamongsuong.png">Quần kaki nam ống suông</option>
    <option value="images/QuanKakiNamUniqlo.png">Quần kaki Uniqlo</option>
    <option value="images/quankakinulungcao.png">Quần kaki nữ lưng cao</option>
    <option value="images/quanshortjeannu.png">Quần short jean nữ</option>
    <option value="images/quanshortnamdenim.png">Quần short nam denim</option>
    <option value="images/quanshortnucapthun.png">Quần short nữ cạp thun</option>
    <option value="images/quanshortnugiavay.png">Quần short nữ giả váy</option>
    <option value="images/quanshorttaynam.png">Quần short tay nam</option>
    <option value="images/quantaycapcaonam.png">Quần tây nam</option>
    <option value="images/quantaynuongdung.png">Quần tây nữ</option>
    <option value="images/quantayongxuongnam.png">Quần tây ống suông</option>
</select>

        <button onclick="saveProduct()">Lưu</button>
        <button onclick="closeModal()">Đóng</button>
    </div>
</div>
</body>
</html>
