<!DOCTYPE html>
<html lang="vi">
    <head>
        <meta charset="UTF-8">
        <title>Admin Panel - Fashion Shop</title>
        <link rel="stylesheet"href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>

		*{
		margin:0;
		padding:0;
		box-sizing:border-box;
		font-family:Arial;
		}

		body{
		background:#f4f6f9;
		}

		/* Layout */

		.container{
		display:flex;
		min-height:100vh;
		}

		/* Sidebar */

		.sidebar{
		width:240px;
		background:#1e1e2f;
		color:white;
		padding:20px;
		display:flex;
		flex-direction:column;
		justify-content:space-between;
		}

		.sidebar h2{
		text-align:center;
		margin-bottom:30px;
		}

		.sidebar ul{
		list-style:none;
		}

		.sidebar li{
		margin:18px 0;
		}

		.sidebar a{
		color:white;
		text-decoration:none;
		font-size:16px;
		display:flex;
		align-items:center;
		gap:10px;
		padding:8px;
		border-radius:6px;
		transition:0.3s;
		}

		.sidebar a:hover{
		background:#2c3e50;
		color:#ff9800;
		}

		/* Logout */

		.logout{
		padding-top:20px;
		border-top:1px solid rgba(255,255,255,0.2);
		}

		.logout button{
		width:100%;
		padding:12px;
		background:linear-gradient(135deg,#ff4b2b,#ff416c);
		color:white;
		border:none;
		border-radius:8px;
		font-size:15px;
		font-weight:bold;
		cursor:pointer;
		display:flex;
		align-items:center;
		justify-content:center;
		gap:8px;
		transition:0.3s;
		}

		.logout button:hover{
		transform:translateY(-2px);
		box-shadow:0 6px 12px rgba(0,0,0,0.2);
		}

		/* Main */

		.main{
		flex:1;
		padding:30px;
		}

		.main h1{
		margin-bottom:25px;
		}

		/* Dashboard cards */

		.cards{
		display:grid;
		grid-template-columns:repeat(4,1fr);
		gap:20px;
		margin-bottom:30px;
		}

		.card{
		background:white;
		padding:20px;
		border-radius:10px;
		box-shadow:0 3px 8px rgba(0,0,0,0.1);
		text-align:center;
		transition:0.3s;
		}

		.card:hover{
		transform:translateY(-3px);
		}

		.card i{
		font-size:28px;
		color:#ff9800;
		margin-bottom:10px;
		}

		/* Product table */

		.table-container{
		background:white;
		padding:20px;
		border-radius:10px;
		box-shadow:0 3px 8px rgba(0,0,0,0.1);
		}

		.add{
		background:#27ae60;
		color:white;
		border:none;
		padding:10px 14px;
		border-radius:6px;
		cursor:pointer;
		margin-bottom:15px;
		}

		.add:hover{
		background:#1e8449;
		}

		table{
		width:100%;
		border-collapse:collapse;
		}

		th,td{
		padding:12px;
		text-align:center;
		border-bottom:1px solid #ddd;
		}

		th{
		background:#2c3e50;
		color:white;
		}

		img{
		width:60px;
		border-radius:5px;
		}

		.edit{
		background:#2196f3;
		color:white;
		border:none;
		padding:6px 10px;
		border-radius:4px;
		cursor:pointer;
		}

		.delete{
		background:#e74c3c;
		color:white;
		border:none;
		padding:6px 10px;
		border-radius:4px;
		cursor:pointer;
		}

		.edit:hover{
		background:#1976d2;
		}

		.delete:hover{
		background:#c0392b;
		}

		/* Responsive */

		@media(max-width:900px){

		.cards{
		grid-template-columns:repeat(2,1fr);
		}

		.sidebar{
		width:200px;
		}

		}

		</style>
</head>
<body>
<div class="container">
<!-- Sidebar -->

<div class="sidebar">
<div>
<h2>Fashion Admin</h2>
<ul>
    <li><a href="dashboard.html"><i class="fa fa-chart-line"></i> Dashboard </a> </li> 
    <li><a href="admin.html"><i class="fa fa-shirt"></i> Products </a></li> <li><a href="orders.html"><i class="fa fa-cart-shopping"></i> Orders </a></li>
    <li><a href="reviews.html"><i class="fa fa-star"></i> Reviews </a></li>
    <li><a href="#"><i class="fa fa-envelope"></i> Feedback </a> </li>
</ul>

</div>

<div class="logout">
    <button onclick="logout()"> <i class="fa fa-right-from-bracket"></i>
        Đăng xuất
    </button>
</div>

</div>

<!-- Main content -->

<div class="main">
    <h1>Dashboard</h1>
<div class="cards">
<div class="card"><i class="fa fa-shirt"></i>
    <h3>Products</h3>
    <p>120</p>
</div>

<div class="card">
    <i class="fa fa-cart-shopping"></i>
    <h3>Orders</h3> 
    <p>80</p>
</div>

<div class="card">
    <i class="fa fa-star"></i>
    <h3>Reviews</h3>
    <p>34</p>
</div>

<div class="card">
    <i class="fa fa-envelope"></i>
    <h3>Feedback</h3>
    <p>12</p>
</div>
</div>

<div class="table-container">

<h2>Product Management</h2>

<button class="add"> <i class="fa fa-plus"></i> Add Product </button>

<table>
<tr>
<th>ID</th>
<th>Image</th>
<th>Name</th>
<th>Price</th>
<th>Old Price</th>
<th>Action</th>
</tr>

<tr>
<td>1</td>
<td>
<img src="https://i.imgur.com/2DhmtJ4.jpg">
</td>
<td>Men T-Shirt</td>
<td>200.000đ</td>
<td><del>300.000đ</del></td>
<td>
<button class="edit">Edit</button>
<button class="delete">Delete</button>
</td>
</tr>

<tr>
<td>2</td>
<td>
<img src="https://i.imgur.com/2DhmtJ4.jpg">
</td>
<td>Women Dress</td>
<td>350.000đ</td>
<td><del>450.000đ</del></td>
<td>
<button class="edit">Edit</button>
<button class="delete">Delete</button>
</td>
</tr>

</table>
</div>
</div>
</div>

<script>
function logout(){
if(confirm("Bạn có chắc muốn đăng xuất không?")){
window.location.href="login.html";
}
}
</script>
</body>
</html>
