<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Register - Fashion Shop</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.form-container{
background:white;
padding:35px;
border-radius:10px;
width:420px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h2{
text-align:center;
color:#1e1e2f;
margin-bottom:20px;
}

.form-box{
border:1px solid #ddd;
padding:20px;
border-radius:8px;
}

.input-group{
display:flex;
align-items:center;
border:1px solid #ccc;
border-radius:5px;
margin-bottom:12px;
padding:8px;
}

.input-group i{
margin-right:10px;
color:#1e1e2f;
}

.input-group input{
border:none;
outline:none;
flex:1;
}

.eye{
cursor:pointer;
color:#666;
}

button{
width:100%;
padding:10px;
background:#1e1e2f;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#2c3e50;
}

.link{
text-align:center;
margin-top:15px;
font-size:14px;
}

.link a{
color:#ff9800;
text-decoration:none;
font-weight:bold;
}

</style>
</head>

<body>

<div class="form-container">

<h2>Đăng Ký Tài Khoản</h2>

<div class="form-box">

<form action="../backend/register.php" method="POST">

<div class="input-group">
<i class="fa fa-user"></i>
<input type="text" name="fullname" placeholder="Họ tên" required>
</div>

<div class="input-group">
<i class="fa fa-envelope"></i>
<input type="email" name="email" placeholder="Email" required>
</div>

<div class="input-group">
<i class="fa fa-phone"></i>
<input type="text" name="phone" placeholder="Số điện thoại" required>
</div>

<div class="input-group">
<i class="fa fa-lock"></i>
<input id="pass1" name="password" type="password" placeholder="Mật khẩu" required>
<i class="fa fa-eye eye" onclick="togglePass('pass1')"></i>
</div>

<div class="input-group">
<i class="fa fa-lock"></i>
<input id="pass2" type="password" placeholder="Nhập lại mật khẩu">
<i class="fa fa-eye eye" onclick="togglePass('pass2')"></i>
</div>

<button type="submit">
<i class="fa fa-user-plus"></i> Đăng ký
</button>

</form>

</div>

<div class="link">
Đã có tài khoản? 
<a href="login.html">Đăng nhập</a>
</div>

</div>

<script>

function togglePass(id){

let pass = document.getElementById(id);

if(pass.type === "password"){
pass.type = "text";
}else{
pass.type = "password";
}

}

</script>

</body>
</html>
