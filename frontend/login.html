<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Login - Fashion Shop</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>

body{
margin:0;
font-family:Arial;
background:#f4f6f9;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.form-container{
background:white;
padding:35px;
border-radius:10px;
width:380px;
box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h2{
text-align:center;
color:#1e1e2f;
margin-bottom:25px;
}

.form-box{
border:1px solid #ddd;
padding:20px;
border-radius:8px;
}

.input-group{
display:flex;
align-items:center;
border:1px solid #ccc;
border-radius:5px;
margin-bottom:15px;
padding:8px;
}

.input-group i{
margin-right:10px;
color:#1e1e2f;
}

.input-group input{
border:none;
outline:none;
flex:1;
}

.eye{
cursor:pointer;
color:#666;
}

button{
width:100%;
padding:10px;
background:#1e1e2f;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#2c3e50;
}

.link{
text-align:center;
margin-top:15px;
font-size:14px;
}

.link a{
color:#ff9800;
text-decoration:none;
font-weight:bold;
}

.forgot{
text-align:right;
margin-bottom:10px;
font-size:13px;
}

.forgot a{
color:#ff9800;
text-decoration:none;
}

</style>
</head>

<body>

<div class="form-container">

<h2>Đăng Nhập</h2>

<div class="form-box">

<form action="../backend/login.php" method="POST">

<div class="input-group">
<i class="fa fa-envelope"></i>
<input type="email" name="email" placeholder="Email" required>
</div>

<div class="input-group">
<i class="fa fa-lock"></i>
<input id="password" name="password" type="password" placeholder="Mật khẩu" required>
<i class="fa fa-eye eye" onclick="togglePassword()"></i>
</div>

<div class="forgot">
<a href="#">Quên mật khẩu?</a>
</div>

<button type="submit">
<i class="fa fa-sign-in-alt"></i> Đăng nhập
</button>

</form>

</div>

<div class="link">
Chưa có tài khoản? 
<a href="register.html">Đăng ký</a>
</div>

</div>

<script>

function togglePassword(){
let pass = document.getElementById("password");

if(pass.type === "password"){
pass.type = "text";
}else{
pass.type = "password";
}

}

</script>

</body>
</html>
