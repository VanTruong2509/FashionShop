<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/Frontend/signinout/stylesigninout/login.css">
    <link rel="icon" href="/Frontend/images/bieutuong.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <title>TRANG ĐĂNG KÝ</title>
</head>

<body>

    <div class="form-container">

        <h1>Đăng Nhập</h1>

        <div class="form-box">
            <form action="../backend/login.php" method="POST">

                <div class="input-group">
                    <i class="fa fa-user"></i>
                    <input type="text" name="fullname" placeholder="Họ tên" required>
                </div>

                <div class="input-group">
                    <i class="fa fa-lock"></i>
                    <input id="password" name="password" type="password" placeholder="Mật khẩu" required>
                    <i class="fa fa-eye eye" onclick="togglePassword()"></i>
                </div>

                <div class="forgot">
                    <a href="#">Quên mật khẩu?</a>
                </div>

                <button type="submit">
                    <i class="fa fa-sign-in-alt"></i> Đăng Nhập
                </button>

            </form>
        </div>

        <div class="link">
            <p>Chưa có tài khoản?</p>
            <a href="/Frontend/signinout/framesigninout/register.html"><p>Đăng Ký</p></a>
        </div>
    </div>
</body>
</html>
