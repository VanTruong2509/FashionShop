<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/Frontend/signinout/stylesigninout/register.css">
    <link rel="icon" href="/Frontend/images/bieutuong.png">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <title>TRANG ĐĂNG KÝ</title>
</head>

<body>
    <div class="form-container">
        <h1>Đăng Ký Tài Khoản</h1>

        <div class="form-box">
            <form>
                <div class="input-group">
                    <i class="fa fa-user"></i>
                    <input type="text" name="fullname" placeholder="Họ tên" required>
                </div>

                <div class="input-group">
                    <i class="fa fa-envelope"></i>
                    <input type="email" name="email" placeholder="Email" required>
                </div>

                <div class="input-group">
                    <i class="fa fa-phone"></i>
                    <input type="text" name="phone" placeholder="Số điện thoại" required>
                </div>

                <div class="input-group">
                    <i class="fa fa-lock"></i>
                    <input id="pass1" name="password" type="password" placeholder="Mật khẩu" required>
                    <i class="fa fa-eye eye"></i>
                </div>

                <div class="input-group">
                    <i class="fa fa-lock"></i>
                    <input id="pass2" type="password" placeholder="Nhập lại mật khẩu">
                    <i class="fa fa-eye eye"></i>
                </div>

                <button type="submit">
                    <i class="fa fa-user-plus"></i> Đăng Ký
                </button>
            </form>
        </div>

        <div class="link">
            <p>Đã có tài khoản?</p>
            <a href="/Frontend/signinout/framesigninout/login.html"><p>Đăng Nhập</p></a>
        </div>
    </div>
</body>
</html>
